[build]
  publish = ".next"
  command = "pnpm build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cache"

  [plugins.inputs]
    paths = [".next/cache"]

## itp blog redirect
[[redirects]]
  from = "/itp-blog*"
  to = "https://danblog.netlify.app/itp-blog/:splat"
  status = 200
  force = true # COMMENT: ensure that we always redirect
  headers = {X-From = "Netlify"}
  signed = "API_SIGNATURE_TOKEN"

## blog redirect
[[redirects]]
  from = "/resume*"
  to = "https://dano-resume.netlify.app/resume/:splat"
  status = 200
  force = true # COMMENT: ensure that we always redirect
  headers = {X-From = "Netlify"}
  signed = "API_SIGNATURE_TOKEN"

## www.danoved.xyz => danoved.xyz
[[redirects]]
  from = "https://www.danoved.xyz/*"
  to = "https://danoved.xyz/:splat"
  status = 301
  force = true

## www.danioved.com => danoved.xyz
[[redirects]]
  from = "https://www.danioved.com*"
  to = "https://danoved.xyz/:splat"
  status = 301
  force = true # COMMENT: ensure that we always redirect
  headers = {X-From = "Netlify"}
  signed = "API_SIGNATURE_TOKEN"

## danoved.com => danoved.xyz
[[redirect]]
  from = 'https://danoved.com/*'
  to = 'https://danoved.xyz/:splat'
  status = 301
  force = true
